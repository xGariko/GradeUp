<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" aria-live="polite" aria-atomic="true">
  @for (t of toasts(); track t.id) {
    <div class="toast show align-items-center text-bg-dark border-0" role="status">
      <div class="d-flex">
        <div class="toast-body">{{ t.text }}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" aria-label="Chiudi"
                (click)="dismiss(t.id)"></button>
      </div>
    </div>
  }
</div>
